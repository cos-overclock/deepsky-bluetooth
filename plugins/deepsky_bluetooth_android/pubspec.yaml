name: deepsky_bluetooth_android
description: "Android native implementation for deepsky_bluetooth (Kotlin/Pigeon): BLE scanning, GATT, foreground service, and CompanionDevice support."
version: 0.0.1
publish_to: 'none'
resolution: workspace

environment:
  sdk: ^3.12.2
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.deepsky_bluetooth_android
        pluginClass: DeepskyBluetoothAndroidPlugin
