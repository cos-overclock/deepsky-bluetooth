name: deepsky_bluetooth_ios
description: "iOS native implementation for deepsky_bluetooth (CoreBluetooth/Pigeon): BLE scanning, GATT, and background state restoration."
version: 0.0.1
publish_to: 'none'
resolution: workspace

environment:
  sdk: ^3.12.2
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  pigeon: ^26.0.2

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: DeepskyBluetoothIosPlugin
