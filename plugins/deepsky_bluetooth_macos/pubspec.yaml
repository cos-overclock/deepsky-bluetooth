name: deepsky_bluetooth_macos
description: "macOS native implementation for deepsky_bluetooth (CoreBluetooth/Pigeon): BLE scanning and GATT (foreground only)."
version: 0.0.1
publish_to: 'none'
resolution: workspace

environment:
  sdk: ^3.12.2
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      macos:
        pluginClass: DeepskyBluetoothMacosPlugin
