name: deepsky_bluetooth_ios_bridge
description: "iOS bridge for deepsky_bluetooth: implements the platform interface by delegating to the deepsky_bluetooth_ios plugin over Pigeon."
version: 0.0.1
publish_to: 'none'
resolution: workspace

environment:
  sdk: ^3.12.2
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  steady: ^1.2.0
  deepsky_bluetooth_util:
    path: ../deepsky_bluetooth_util

  deepsky_bluetooth_interface:
    path: ../deepsky_bluetooth_interface

  deepsky_bluetooth_ios:
    path: ../../plugins/deepsky_bluetooth_ios

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

